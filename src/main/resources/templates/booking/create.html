<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Запись на услугу — АвтоМастер</title>
   <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

  <!-- Шапка -->
  <header>
    <div class="logo">Авто<span>Мастер</span></div>
    <a href="/" class="back-link">← На главную</a>
  </header>

  <!-- Форма записи -->
  <main class="form-card">
    <h1>Записаться на услугу</h1>
    <p>Выберите услугу, дату и оставьте контакт — мы перезвоним для подтверждения</p>

    <form method="post" action="/booking/save">

      <div class="form-group">
        <label for="item">Услуга</label>

        <select name="item.id" id="item" class="form-control" required>
            <option value="" disabled>Выберите услугу</option>
            <option th:each="item : ${items}"
                    th:text="|${item.title} - ${item.price} ₽|"
                    th:value="${item.id}"
                    th:selected="${item.id == selectedId}">
            </option>
        </select>
      </div>
      
      <div class="form-group">
          <label for="location">Адрес</label>
          <select name="location.id" id="location" class="form-control" required>
              <option value="" disabled selected>Выберите филиал</option>
              <option th:each="location : ${locations}"
                      th:text="|${location.city}, ${location.street}, ${location.house}|"
                      th:value="${location.id}">
              </option>
          </select>
      </div>

      <div class="form-group">
        <label for="date">Дата записи</label>
        <input type="date" 
               name="date" 
               id="date"
               class="form-control" 
               placeholder="На какую дату" 
               required 
               th:min="${minDate}">
      </div>

      <div class="form-group">
        <label for="phone">Номер телефона</label>
        <input type="tel" 
               name="phone" 
               id="phone"
               class="form-control" 
               placeholder="+7 (___) ___-__-__" 
               required
               pattern="^[\d\s\+\-\(\)]{10,}$">
      </div>

      <button type="submit" class="btn-submit">Записаться</button>

    </form>
  </main>

  <!-- Подвал -->
  <footer>
    <p>© 2026 <span>АвтоМастер</span>. Все права защищены.</p>
  </footer>

</body>
</html>
