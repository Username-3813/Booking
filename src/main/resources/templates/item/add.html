<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление услуги</title>

    <link rel="stylesheet" th:href="@{/css/admin_header.css}">
    <link rel="stylesheet" th:href="@{/css/admin_btn.css}">
    <link rel="stylesheet" th:href="@{/css/admin_content.css}">
</head>
<body>

<header th:replace="~{fragment/header :: header}"></header>

<main class="main-content">
    <div class="page-header">
        <h1>Добавление услуги</h1>
    </div>

    <section class="content-card">
        <form class="admin-form" method="post" th:action="@{/items/save}" th:object="${item}" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label for="title">Название</label>
                <input id="title" type="text" th:field="*{title}" name="title" placeholder="Название" required>
            </div>

            <div class="form-group">
                <label for="price">Цена, руб.</label>
                <input id="price" type="number" th:field="*{price}" name="price" placeholder="Цена, руб." min="0" required>
            </div>

            <div class="form-group">
                <label for="duration">Длительность, мин.</label>
                <input id="duration" type="number" th:field="*{duration}" name="duration" placeholder="Длительность, мин." min="1" required>
            </div>

            <div class="form-group">
                <label for="info">Описание</label>
                <textarea id="info" th:field="*{info}" name="info" placeholder="Описание" rows="6"></textarea>
            </div>

            <div class="form-group">
                <label for="cover">Изображение</label>
                <input id="cover" type="file" th:field="*{cover}" accept="image/png,image/jpeg">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-add">Сохранить</button>
                <a href="/items" class="btn btn-add">Вернуться к списку</a>
            </div>
        </form>
    </section>
</main>
<div th:replace="~{fragment/footer :: footer}"></div>

</body>
</html>
