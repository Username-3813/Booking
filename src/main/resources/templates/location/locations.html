<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список адресов</title>

    <link rel="stylesheet" th:href="@{/css/admin_header.css}">
    <link rel="stylesheet" th:href="@{/css/admin_btn.css}">
    <link rel="stylesheet" th:href="@{/css/admin_content.css}">
</head>
<body>
    
<header th:replace="~{fragment/header :: header}"></header>

<main class="main-content">
    <div class="page-header">
        <h1>Список автосервисов</h1>
        <a href="/locations/add" class="btn btn-add">Добавить автосервис</a>
    </div>

    <section class="content-card">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Город</th>
                    <th>Улица</th>
                    <th>№ Дома</th>
                    <th>Действие</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="location : ${locations}">
                    <td th:text="${location.city}"></td>
                    <td th:text="${location.street}"></td>
                    <td th:text="${location.house}"></td>
                    <td class="table-actions">
                        <a th:href="|/locations/edit/${location.id}|"
                           class="btn btn-add btn-icon"
                           title="Редактировать">
                            ✏️
                        </a>

                        <a th:href="|/locations/delete/${location.id}|"
                           class="btn btn-delete btn-icon"
                           title="Удалить"
                           onclick="return confirm('Удалить автосервис?');">
                            🗑️
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>
</main>
<div th:replace="~{fragment/footer :: footer}"></div>

</body>
</html>
