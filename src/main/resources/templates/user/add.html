<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить пользователя</title>

    <link rel="stylesheet" th:href="@{/css/admin_header.css}">
    <link rel="stylesheet" th:href="@{/css/admin_btn.css}">
    <link rel="stylesheet" th:href="@{/css/admin_content.css}">
</head>
<body>

<header th:replace="~{fragment/header :: header}"></header>

<main class="main-content">
    <div class="page-header">
        <h1>Добавление пользователя</h1>
    </div>

    <section class="content-card">
        <form class="admin-form" method="post" th:action="@{/users/save}" th:object="${user}">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label for="name">Имя</label>
                <input id="name" type="text" th:field="*{name}" name="name" placeholder="Имя" required>
            </div>

            <div class="form-group">
                <label for="surname">Фамилия</label>
                <input id="surname" type="text" th:field="*{surname}" name="surname" placeholder="Фамилия" required>
            </div>

            <div class="form-group">
                <label for="phone">Телефон</label>
                <input id="phone" type="text" th:field="*{phone}" name="phone" placeholder="Телефон" required>
            </div>

            <div class="form-group">
                <label for="email">Эл. почта</label>
                <input id="email" type="email" th:field="*{email}" name="email" placeholder="Эл. почта" required>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input id="password" type="password" th:field="*{password}" name="password" placeholder="Пароль" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-add">Сохранить</button>
            </div>
        </form>
    </section>
</main>
<div th:replace="~{fragment/footer :: footer}"></div>

</body>
</html>
