<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список пользователей</title>

    <link rel="stylesheet" th:href="@{/css/admin_header.css}">
    <link rel="stylesheet" th:href="@{/css/admin_btn.css}">
    <link rel="stylesheet" th:href="@{/css/admin_content.css}">
</head>
<body>

<header th:replace="~{fragment/header :: header}"></header>

<main class="main-content">
    <div class="page-header">
        <h1>Список пользователей</h1>
        <a th:href="@{/users/add}" class="btn btn-primary">Добавить пользователя</a>
    </div>

    <section class="content-card">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Фамилия</th>
                    <th>Имя</th>
                    <th>Телефон</th>
                    <th>Эл. почта</th>
                    <th>Действие</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.surname}"></td>
                    <td th:text="${user.name}"></td>
                    <td th:text="${user.phone}"></td>
                    <td th:text="${user.email}"></td>

                    <td class="table-actions">
                        <a th:href="|/users/edit/${user.id}|"
                           class="btn btn-edit btn-icon"
                           title="Редактировать">
                            ✏️
                        </a>

                        <a th:href="|/users/delete/${user.id}|"
                           class="btn btn-delete btn-icon"
                           title="Удалить"
                           onclick="return confirm('Удалить пользователя?');">
                            🗑️
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>
</main>

<div th:replace="~{fragment/footer :: footer}"></div>

</body>
</html>
